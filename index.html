<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Estado de cuenta</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f5f7fb" />
  <style>
    :root{
      --bg:#f5f7fb;--card:#fff;--text:#15202b;--muted:#667085;--line:#d7dde8;
      --ok:#11845b;--danger:#c62828;--primary:#0f62fe;--shadow:0 10px 24px rgba(16,24,40,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
    .hidden{display:none!important}

    /* Login limpio */
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
    .login-card{width:100%;max-width:430px;background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:22px}
    .login-card h1{margin:0 0 6px;font-size:25px;letter-spacing:-.02em}
    .login-card p{margin:0 0 18px;color:var(--muted);font-size:14px;line-height:1.4}
    .input{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px 13px;font:inherit;outline:none;background:#fff}
    .input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(15,98,254,.12)}
    .btn{width:100%;border:0;border-radius:14px;padding:14px 16px;background:var(--primary);color:#fff;font-weight:900;font-size:15px;cursor:pointer;margin-top:12px}
    .btn:disabled{opacity:.65;cursor:not-allowed}
    .checkline{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;color:var(--muted)}
    .error{margin-top:12px;border-radius:14px;padding:11px 12px;background:#fef3f2;border:1px solid #fecdca;color:#7a271a;font-size:13px;line-height:1.35}
    .hint{margin-top:12px;color:var(--muted);font-size:12px;line-height:1.35}

    .app-logo{display:block;width:128px;height:128px;object-fit:contain;margin:0 auto 14px;filter:drop-shadow(0 10px 18px rgba(16,24,40,.16))}
    .brand-row{display:flex;align-items:center;gap:8px;min-width:0}
    .topbar-logo{width:34px;height:34px;object-fit:contain;flex:0 0 auto;filter:drop-shadow(0 3px 7px rgba(16,24,40,.12))}

    /* Vista limpia de movimientos */
    #appScreen{min-height:100vh;padding:10px 10px 22px}
    .topbar{position:sticky;top:0;z-index:5;background:rgba(245,247,251,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 4px 10px;margin:0 -10px 10px}
    .topbar-inner{max-width:900px;margin:0 auto;padding:0 10px;display:flex;align-items:center;gap:10px;justify-content:space-between}
    .title-wrap{min-width:0}.title{font-size:18px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.subtitle{color:var(--muted);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .icon-btn{border:1px solid var(--line);background:#fff;color:#1d2939;border-radius:12px;padding:9px 10px;font-weight:800;cursor:pointer;box-shadow:0 4px 10px rgba(16,24,40,.04)}
    .content{max-width:900px;margin:0 auto;padding-bottom:90px}
    .floating-total-wrap{position:sticky;top:72px;z-index:4;display:flex;justify-content:center;align-items:center;gap:10px;pointer-events:none;margin:0 0 10px;flex-wrap:wrap}
    .floating-total{pointer-events:auto;background:#eaf4ff;border:1pt solid #fff;border-radius:999px;box-shadow:0 10px 24px rgba(16,24,40,.12);padding:9px 18px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(12px)}
    .summary-label{color:#56d05f;font-size:12px;font-weight:900;white-space:nowrap}
    .summary-total{font-size:22px;font-weight:950;white-space:nowrap;color:#2f8f6b}
    .floating-total.neg{background:#fff0f0}.floating-total.neg .summary-label,.floating-total.neg .summary-total{color:#c94747}
    .push-cta{pointer-events:auto;border:1px solid rgba(196,81,0,.18);background:#fff7ed;color:#9a3412;border-radius:999px;box-shadow:0 10px 24px rgba(16,24,40,.10);padding:9px 13px;display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:950;cursor:pointer;white-space:nowrap;max-width:92vw}
    .push-cta .bell{font-size:15px;line-height:1}.push-cta:active{transform:scale(.98)}.push-cta.hidden{display:none!important}
    .push-cta.ready{background:#ecfdf3;color:#067647;border-color:#abefc6}
    #toastBox{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;width:min(92vw,430px);pointer-events:none}.toast{pointer-events:auto;border-radius:16px;padding:13px 15px;background:#111827;color:#fff;box-shadow:0 14px 34px rgba(16,24,40,.22);font-size:14px;font-weight:850}.toast.ok{background:#067647}.toast.err{background:#b42318}.toast.warn{background:#b54708}

    .floating-total.pos{background:#eaf8f0}.floating-total.pos .summary-label,.floating-total.pos .summary-total{color:#2f8f6b}
    .filters{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
    .filter-option{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 8px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:850;color:#344054;white-space:nowrap}
    .filter-option input{margin:0;accent-color:var(--primary)}
    .search{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit;outline:none;margin-bottom:10px;background:#fff}
    .list{display:grid;gap:16px}
    .month-card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 6px 18px rgba(16,24,40,.05);overflow:hidden;display:grid;grid-template-columns:76px 1fr}
    .month-rail{background:linear-gradient(180deg,#ffc400 0%,#ffb800 100%);border-right:1px solid rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;padding:10px 6px;min-height:100%}
    .month-vertical{font-size:24px;font-weight:950;line-height:1.55;letter-spacing:.02em;color:#060606;text-align:center;white-space:pre-line;text-shadow:0 1px 0 rgba(255,255,255,.22)}
    .month-movs{display:grid;gap:0;min-width:0}
    .mov{background:#fff;border:0;border-bottom:1px solid rgba(0,0,0,.12);border-radius:0;padding:0;box-shadow:none;min-width:0}
    .mov:last-child{border-bottom:0}
    .mov.mov-pos{background:linear-gradient(90deg,#f1fbf6 0%,#fbfffd 100%)}
    .mov.mov-neg{background:linear-gradient(90deg,#fff0f2 0%,#fff8f9 100%)}
    .mov-row{display:grid;grid-template-columns:64px minmax(0,1fr) clamp(146px,18vw,174px);align-items:center;gap:0;min-width:0}
    .day-cell{height:58px;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(0,0,0,.12);font-size:30px;font-weight:950;color:#050505;letter-spacing:-.04em;background:rgba(255,255,255,.28)}
    .mov-main{min-width:0;padding:10px 12px}.desc{font-size:17px;font-weight:850;line-height:1.22;word-break:break-word}.new-tag{display:inline-flex;align-items:center;margin-left:8px;padding:3px 7px;border-radius:7px;background:#e92d3a;color:#fff;font-size:10px;font-weight:950;letter-spacing:.03em;vertical-align:middle;box-shadow:0 4px 10px rgba(233,45,58,.18)}.mov.is-new{position:relative}.amount{height:58px;display:flex;align-items:center;justify-content:flex-end;gap:6px;border-left:1px solid rgba(0,0,0,.12);padding:0 14px;font-size:18px;font-weight:950;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;min-width:0;overflow:visible}.amount.pos{color:var(--ok)}.amount.neg{color:var(--danger)}
    @media (max-width:520px){.month-card{grid-template-columns:56px 1fr}.month-vertical{font-size:20px;line-height:1.45}.mov-row{grid-template-columns:48px minmax(0,1fr) 126px}.day-cell{font-size:25px;height:56px}.desc{font-size:15px}.amount{font-size:15px;height:56px;padding:0 10px;gap:4px}.new-tag{font-size:9px;padding:2px 6px}}
    .empty{background:#fff;border:1px dashed var(--line);border-radius:16px;padding:18px;text-align:center;color:var(--muted)}
    .loading-overlay{position:fixed;inset:0;z-index:99;background:rgba(245,247,251,.78);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:22px}
    .loading-box{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:24px 26px;text-align:center;min-width:240px}
    .spinner{width:44px;height:44px;border-radius:50%;border:5px solid #e6edf7;border-top-color:var(--primary);margin:0 auto 14px;animation:girar .8s linear infinite}
    .loading-text{font-weight:900;color:#1d2939}
    @keyframes girar{to{transform:rotate(360deg)}}
    @media print{#loginScreen,.topbar,.search{display:none!important}#appScreen{padding:0}.mov{box-shadow:none;break-inside:avoid}}
  </style>
</head>
<body>
  <section id="loginScreen">
    <div class="login-card">
      <img class="app-logo" src="logo.png" alt="Logo Estado de cuenta" />
      <h1>Estado de cuenta</h1>
      <p>Ingresa el PIN/clave para cargar y descifrar la información.</p>
      <input class="input" type="password" id="clave" placeholder="PIN o clave de acceso" autocomplete="current-password" />
      <label class="checkline"><input type="checkbox" id="recordarClave" /> Recordar en este dispositivo</label>
      <button class="btn" id="btnEntrar" onclick="loginYcargar()">Entrar</button>
      <div id="loginError" class="error hidden"></div>
      <div class="hint">El visor no guarda la clave dentro del código. Si la clave es incorrecta, no se puede descifrar el JSON.</div>
    </div>
  </section>

  <section id="appScreen" class="hidden">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <img class="topbar-logo" src="logo.png" alt="" aria-hidden="true" />
          <div class="title-wrap">
            <div class="title" id="titulo">Movimientos</div>
            <div class="subtitle" id="subtitulo"></div>
          </div>
        </div>
        <button class="icon-btn" onclick="actualizar()">Actualizar</button>
      </div>
    </div>
    <div class="content">
      <div class="floating-total-wrap" aria-live="polite">
        <div class="floating-total pos" id="saldoBubble">
          <span class="summary-label">Saldo total</span>
          <span class="summary-total" id="saldoTotal">$0.00</span>
        </div>
        <button class="push-cta hidden" id="pushCta" type="button" onclick="activarNotificaciones()"><span class="bell">🔔</span><span>Activar notificaciones</span></button>
      </div>
      <div class="filters" role="radiogroup" aria-label="Filtro de movimientos">
        <label class="filter-option"><input type="radio" name="filtroTipo" value="todos" checked onchange="render()" /> Todos</label>
        <label class="filter-option"><input type="radio" name="filtroTipo" value="abonos" onchange="render()" /> Solo abonos</label>
        <label class="filter-option"><input type="radio" name="filtroTipo" value="cargos" onchange="render()" /> Solo cargos</label>
      </div>
      <input class="search" id="buscar" placeholder="Buscar movimiento..." oninput="render()" />
      <div id="lista" class="list"></div>
    </div>
  </section>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="loading-text">Cargando información...</div>
    </div>
  </div>
  <div id="toastBox" aria-live="polite" aria-atomic="true"></div>

<script>
  /***** CONFIGURACIÓN *****/
  const API_URL = 'https://script.google.com/macros/s/AKfycby896Ua2Y6EKgnl0Wn8cjAYXTQmcbIg8XpFKA3SnZokKY4zrLYhsI-9C31d_MZ68mY/exec';
  const STORAGE_KEY = 'cuenta_clara_clave_v2';
  const PUSH_ENABLED_KEY = 'cuenta_clara_push_activado_v2';
  const PUSH_WORKER_URL = 'https://steep-butterfly-5ed1.jelr87.workers.dev';
  /*************************/

  let datos = null;
  let movimientos = [];
  let ENCRYPTION_SECRET = '';
  let newMovementKeys = new Set();
  const $ = id => document.getElementById(id);

  function init(){
    try{
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved){
        $('clave').value = saved;
        $('recordarClave').checked = true;
      }
    }catch(e){}
    $('clave').addEventListener('keydown', ev => { if(ev.key === 'Enter') loginYcargar(); });
  }

  async function loginYcargar(){
    const clave = ($('clave').value || '').trim();
    if(!clave){ mostrarError('Ingresa el PIN/clave de acceso.'); return; }
    ENCRYPTION_SECRET = clave;
    await cargarConClave(true);
  }

  async function cargarConClave(desdeLogin){
    $('btnEntrar').disabled = true;
    $('btnEntrar').textContent = desdeLogin ? 'Validando...' : 'Actualizando...';
    mostrarError('');
    setLoading(true, desdeLogin ? 'Cargando información...' : 'Actualizando información...');
    try{
      if(API_URL.includes('PEGA_AQUI')) throw new Error('Falta configurar API_URL dentro del HTML.');

      const resp = await jsonp(API_URL + '?action=get');
      if(!resp.ok) throw new Error(resp.error || 'No se pudo consultar la API.');

      const previousKeys = new Set(movimientos.map(m => m._key).filter(Boolean));

      datos = await decryptEnvelope(resp.data);
      const loadedMovimientos = (datos.movimientos || []).map((m,i)=>({
        id:i+1,
        fecha:m.fecha,
        descripcion:m.descripcion || '',
        monto_centavos:Number(m.monto_centavos || 0)
      }));
      loadedMovimientos.sort((a,b)=> String(a.fecha).localeCompare(String(b.fecha)) || a.id-b.id);
      assignMovementKeys(loadedMovimientos);

      if(!desdeLogin && previousKeys.size){
        newMovementKeys = new Set(loadedMovimientos.filter(m => !previousKeys.has(m._key)).map(m => m._key));
      }else{
        newMovementKeys = new Set();
      }
      movimientos = loadedMovimientos;

      try{
        if($('recordarClave').checked) localStorage.setItem(STORAGE_KEY, ENCRYPTION_SECRET);
        else localStorage.removeItem(STORAGE_KEY);
      }catch(e){}

      $('titulo').textContent = 'Movimientos' + (datos.persona ? ' · ' + datos.persona : '');
      $('subtitulo').textContent = 'Actualizado: ' + friendlyUpdated(resp.updated || datos.actualizado) + ' · ' + movimientos.length + ' registros';
      $('loginScreen').classList.add('hidden');
      $('appScreen').classList.remove('hidden');
      render(true);
      actualizarEstadoBotonPush();
    }catch(err){
      if(desdeLogin){
        mostrarError(friendlyError(err));
      }else{
        alert(friendlyError(err));
      }
    }finally{
      setLoading(false);
      $('btnEntrar').disabled = false;
      $('btnEntrar').textContent = 'Entrar';
    }
  }

  async function actualizar(){
    if(!ENCRYPTION_SECRET){
      $('appScreen').classList.add('hidden');
      $('loginScreen').classList.remove('hidden');
      return;
    }
    await cargarConClave(false);
  }

  function mostrarError(msg){
    const box = $('loginError');
    if(!msg){ box.textContent=''; box.classList.add('hidden'); return; }
    box.textContent = msg;
    box.classList.remove('hidden');
  }

  function setLoading(show, text){
    const overlay = $('loadingOverlay');
    if(!overlay) return;
    const label = overlay.querySelector('.loading-text');
    if(label && text) label.textContent = text;
    overlay.classList.toggle('hidden', !show);
  }

  function friendlyError(err){
    const msg = String(err && err.message ? err.message : err).toLowerCase();
    if(msg.includes('decrypt') || msg.includes('operation') || msg.includes('clave') || msg.includes('pin')) {
      return 'PIN o clave incorrecta.';
    }
    return 'Error al traer la información. Intenta de nuevo.';
  }

  function render(scrollToLatest){
    const q = ($('buscar').value || '').toLowerCase().trim();
    const filtro = (document.querySelector('input[name="filtroTipo"]:checked') || {}).value || 'todos';
    const lista = $('lista');
    lista.innerHTML = '';

    const saldoTotal = movimientos.reduce((acc, m) => acc + Number(m.monto_centavos || 0), 0);
    $('saldoTotal').textContent = money(saldoTotal);
    $('saldoTotal').className = 'summary-total ' + (saldoTotal < 0 ? 'neg' : 'pos');
    if($('saldoBubble')) $('saldoBubble').className = 'floating-total ' + (saldoTotal < 0 ? 'neg' : 'pos');

    const visibles = [];
    movimientos.forEach(m => {
      const monto = m.monto_centavos;
      const pasaFiltro = filtro === 'todos' || (filtro === 'abonos' && monto < 0) || (filtro === 'cargos' && monto > 0);
      const pasaBusqueda = !q || m.descripcion.toLowerCase().includes(q) || fechaMx(m.fecha).includes(q) || String(monto/100).includes(q) || monthLabel(m.fecha).toLowerCase().includes(q);
      if(pasaFiltro && pasaBusqueda) visibles.push(m);
    });

    if(visibles.length === 0){
      const div = document.createElement('div');
      div.className = 'empty';
      div.textContent = 'No hay movimientos para mostrar.';
      lista.appendChild(div);
      return;
    }

    const groups = new Map();
    visibles.forEach(m => {
      const key = monthKey(m.fecha);
      if(!groups.has(key)) groups.set(key, []);
      groups.get(key).push(m);
    });

    let latestVisibleEl = null;
    Array.from(groups.keys()).sort().forEach(key => {
      const items = groups.get(key);
      const card = document.createElement('section');
      card.className = 'month-card';
      card.innerHTML = `
        <div class="month-rail" aria-label="${monthNameFromKey(key)}"><div class="month-vertical">${monthVerticalFromKey(key)}</div></div>
        <div class="month-movs"></div>`;
      const container = card.querySelector('.month-movs');
      items.forEach(m => {
        const monto = m.monto_centavos;
        const div = document.createElement('div');
        div.className = 'mov ' + (monto >= 0 ? 'mov-pos' : 'mov-neg') + (newMovementKeys.has(m._key) ? ' is-new' : '');
        div.dataset.fecha = m.fecha || '';
        div.innerHTML = `
          <div class="mov-row">
            <div class="day-cell">${dayOfMonth(m.fecha)}</div>
            <div class="mov-main">
              <div class="desc">${escapeHtml(m.descripcion || 'Sin descripción')}${newMovementKeys.has(m._key) ? '<span class="new-tag">NUEVO</span>' : ''}</div>
            </div>
            <div class="amount ${monto>=0?'pos':'neg'}">${monto<0?'-$':'$'}&nbsp;${moneyAbs(monto)}</div>
          </div>`;
        container.appendChild(div);
        latestVisibleEl = div;
      });
      lista.appendChild(card);
    });

    if(scrollToLatest && latestVisibleEl){
      setTimeout(() => latestVisibleEl.scrollIntoView({behavior:'smooth', block:'center'}), 120);
    }
  }

  function monthKey(iso){
    const parts = String(iso || '').split('-');
    if(parts.length >= 2) return parts[0] + '-' + parts[1];
    return '0000-00';
  }

  function monthLabel(iso){
    return monthLabelFromKey(monthKey(iso));
  }

  function dayOfMonth(iso){
    const parts = String(iso || '').split('-');
    return parts.length >= 3 ? String(parts[2]).padStart(2,'0') : '—';
  }

  function monthNameFromKey(key){
    const [,m] = String(key || '').split('-');
    const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const idx = Math.max(0, Math.min(11, Number(m || 1)-1));
    return months[idx];
  }

  function monthVerticalFromKey(key){
    return monthNameFromKey(key).split('').join('\n');
  }

  function moneyAbs(cents){
    const value = Math.abs(Number(cents || 0))/100;
    return new Intl.NumberFormat('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2}).format(value);
  }

  function friendlyUpdated(value){
    const d = parseUpdateDate(value);
    if(!d) return 'sin fecha';
    const now = new Date();
    let diffMs = now.getTime() - d.getTime();
    if(diffMs < 0) diffMs = 0;
    const mins = Math.floor(diffMs / 60000);
    if(mins < 1) return 'hace un momento';
    if(mins <= 60) return `hace ${mins} ${mins === 1 ? 'minuto' : 'minutos'}`;
    const hours = Math.floor(diffMs / 3600000);
    if(hours < 24) return `hace ${hours} ${hours === 1 ? 'hora' : 'horas'}`;
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const thatDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const days = Math.floor((today - thatDay) / 86400000);
    if(days <= 0) return 'hoy';
    if(days <= 3) return `hace ${days} ${days === 1 ? 'día' : 'días'}`;
    return fechaMx(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }

  function parseUpdateDate(value){
    if(!value) return null;
    if(value instanceof Date && !isNaN(value)) return value;
    const s = String(value).trim();
    let d = new Date(s);
    if(!isNaN(d)) return d;
    const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:,?\s*(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(a\.?\s*m\.?|p\.?\s*m\.?)?)?/i);
    if(m){
      let hour = Number(m[4] || 0);
      const min = Number(m[5] || 0);
      const sec = Number(m[6] || 0);
      const ap = String(m[7] || '').toLowerCase();
      if(ap.includes('p') && hour < 12) hour += 12;
      if(ap.includes('a') && hour === 12) hour = 0;
      d = new Date(Number(m[3]), Number(m[2])-1, Number(m[1]), hour, min, sec);
      if(!isNaN(d)) return d;
    }
    return null;
  }

  function monthLabelFromKey(key){
    const [y,m] = String(key || '').split('-');
    const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const idx = Math.max(0, Math.min(11, Number(m || 1)-1));
    if(!y || y === '0000') return 'Sin fecha';
    return months[idx] + ' ' + y;
  }


  function assignMovementKeys(list){
    const seen = {};
    list.forEach(m => {
      const base = [String(m.fecha || ''), normalizeKeyText(m.descripcion || ''), String(Number(m.monto_centavos || 0))].join('|');
      seen[base] = (seen[base] || 0) + 1;
      m._key = base + '|' + seen[base];
    });
  }

  function normalizeKeyText(value){
    return String(value).trim().replace(/\s+/g, ' ').toLowerCase();
  }

  function money(cents){
    return new Intl.NumberFormat('es-MX', {style:'currency', currency: (datos && datos.moneda) || 'MXN'}).format((cents || 0)/100);
  }
  function fechaMx(iso){ if(!iso) return '—'; const [y,m,d] = String(iso).split('-'); return d&&m&&y ? `${d}/${m}/${y}` : iso; }
  function escapeHtml(s){return String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}

  function jsonp(url){
    return new Promise((resolve, reject) => {
      const cb = 'jsonp_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const sep = url.includes('?') ? '&' : '?';
      const script = document.createElement('script');
      const timer = setTimeout(()=>{ cleanup(); reject(new Error('Tiempo agotado al consultar la API.')); }, 20000);
      window[cb] = data => { cleanup(); resolve(data); };
      function cleanup(){ clearTimeout(timer); script.remove(); delete window[cb]; }
      script.onerror = () => { cleanup(); reject(new Error('No se pudo conectar con la API.')); };
      script.src = url + sep + 'callback=' + encodeURIComponent(cb) + '&t=' + Date.now();
      document.body.appendChild(script);
    });
  }

  async function deriveKey(secret, salt, usages){
    const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(secret), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:210000, hash:'SHA-256' }, baseKey, { name:'AES-GCM', length:256 }, false, usages);
  }
  async function decryptEnvelope(env){
    const salt = fromB64(env.salt), iv = fromB64(env.iv), payload = fromB64(env.payload);
    const key = await deriveKey(ENCRYPTION_SECRET, salt, ['decrypt']);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, payload);
    return JSON.parse(new TextDecoder().decode(plain));
  }
  function fromB64(str){ const bin=atob(str); const out=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i); return out; }


  function toast(msg, type){
    const box = $('toastBox');
    if(!box) return;
    const div = document.createElement('div');
    div.className = 'toast ' + (type || '');
    div.textContent = msg;
    box.appendChild(div);
    setTimeout(()=>{ div.style.opacity='0'; div.style.transform='translateY(8px)'; }, 2600);
    setTimeout(()=> div.remove(), 3200);
  }

  function actualizarEstadoBotonPush(){
    const btn = $('pushCta');
    if(!btn) return;
    const soporta = 'serviceWorker' in navigator && 'Notification' in window && 'PushManager' in window;
    if(!soporta){ btn.classList.add('hidden'); return; }
    const activado = localStorage.getItem(PUSH_ENABLED_KEY) === '1';
    btn.classList.toggle('hidden', activado);
  }

  async function activarNotificaciones(){
    const btn = $('pushCta');
    try{
      if(!('serviceWorker' in navigator) || !('Notification' in window) || !('PushManager' in window)){
        toast('Este navegador no permite notificaciones web.', 'warn');
        return;
      }
      if(!PUSH_WORKER_URL){
        toast('Falta configurar notificaciones.', 'err');
        return;
      }
      btn && (btn.disabled = true);

      const reg = await navigator.serviceWorker.register('./service-worker.js');
      await navigator.serviceWorker.ready;

      const permiso = await Notification.requestPermission();
      if(permiso !== 'granted'){
        toast('No se activaron las notificaciones.', 'warn');
        btn && (btn.disabled = false);
        return;
      }

      const keyResp = await fetch(PUSH_WORKER_URL + '/vapid-public-key');
      const keyData = await keyResp.json();
      if(!keyData.ok || !keyData.publicKey) throw new Error('No se pudo obtener llave pública.');

      let sub = await reg.pushManager.getSubscription();
      if(!sub){
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(keyData.publicKey)
        });
      }

      const saveResp = await fetch(PUSH_WORKER_URL + '/subscribe?t=' + Date.now(), {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(sub)
      });
      const saveData = await saveResp.json().catch(() => ({ok:false}));
      console.log('Respuesta /subscribe:', saveResp.status, saveData);
      if(!saveResp.ok || !saveData.ok) throw new Error('No se pudo guardar suscripción.');

      const countResp = await fetch(PUSH_WORKER_URL + '/count?t=' + Date.now(), { cache: 'no-store' });
      const countData = await countResp.json().catch(() => ({ok:false, subscriptions:0}));
      console.log('Respuesta /count:', countResp.status, countData);
      if(!countResp.ok || !countData.ok || Number(countData.subscriptions || 0) < 1) {
        throw new Error('La suscripción no quedó registrada.');
      }

      localStorage.setItem(PUSH_ENABLED_KEY, '1');
      actualizarEstadoBotonPush();
      toast('Notificaciones activadas.', 'ok');
    }catch(err){
      console.warn(err);
      toast('No se pudieron activar las notificaciones.', 'err');
      btn && (btn.disabled = false);
    }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }


  init();
</script>
